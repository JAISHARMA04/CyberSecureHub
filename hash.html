<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hash Generator — Cyber Secure Hub</title>

  <!-- spark-md5 for MD5 hashing (client-side, small) -->
  <script src="https://cdn.jsdelivr.net/npm/spark-md5@3.0.2/spark-md5.min.js"></script>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">CYBER<span>HUB</span></div>
    <nav>
      <a href="index.html">Home</a>
      <a href="password.html">Password Checker</a>
      <a href="hash.html" class="active">Hash Generator</a>
      <a href="news.html">Cyber News</a>
      <a href="officials.html">Cyber Officials</a>
    </nav>
  </header>

  <main class="container">
    <section class="card large">
      <h2>Text Hashing</h2>
      <label>Text input</label>
      <textarea id="hashText" rows="4" placeholder="Type text to hash..."></textarea>

      <div class="row">
        <select id="hashAlgo">
          <option value="md5">MD5</option>
          <option value="sha-256">SHA-256</option>
        </select>
        <button id="hashBtn" class="btn">Compute</button>
        <button id="hashClear" class="btn outline">Clear</button>
      </div>

      <label>Result</label>
      <input id="hashResult" readonly />

      <hr/>

      <h3>File Hashing (client-side)</h3>
      <input id="fileInput" type="file" />
      <div class="row">
        <select id="fileAlgo">
          <option value="sha-256">SHA-256</option>
          <option value="md5">MD5</option>
        </select>
        <button id="fileHashBtn" class="btn">Hash File</button>
      </div>
      <input id="fileHashResult" readonly placeholder="File hash will appear here" />
      <div class="muted">Files are NOT uploaded — hashing happens in your browser.</div>
    </section>
  </main>

  <script src="js/hashTool.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
