<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Password Checker — Cyber Secure Hub</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">CYBER<span>HUB</span></div>
    <nav>
      <a href="index.html">Home</a>
      <a href="password.html" class="active">Password Checker</a>
      <a href="hash.html">Hash Generator</a>
      <a href="news.html">Cyber News</a>
      <a href="officials.html">Cyber Officials</a>
    </nav>
  </header>

  <main class="container">
    <section class="card large">
      <h2>Password Strength Checker</h2>

      <label>Enter password</label>
      <div class="row">
        <input id="pwdInput" type="password" placeholder="Type a password to check" />
        <button id="pwdToggle" class="small">Show</button>
      </div>

      <div class="meter">
        <div id="pwdBar" class="bar"></div>
      </div>
      <div id="pwdAdvice" class="muted">Type a password to see advice.</div>

      <hr/>

      <h3>Generate a secure password</h3>
      <div class="row">
        <input id="genLen" type="number" min="8" max="64" value="16" />
        <button id="genBtn" class="btn">Generate</button>
        <input id="genResult" readonly placeholder="Generated password appears here" />
        <button id="copyGen" class="btn small">Copy</button>
      </div>
    </section>
  </main>

  <script src="passwordTool.js"></script>
  <script src="main.js"></script>
</body>
</html>
