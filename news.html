<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cyber News — Cyber Secure Hub</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">CYBER<span>HUB</span></div>
    <nav>
      <a href="index.html">Home</a>
      <a href="password.html">Password Checker</a>
      <a href="hash.html">Hash Generator</a>
      <a href="news.html" class="active">Cyber News</a>
      <a href="officials.html">Cyber Officials</a>
    </nav>
  </header>

  <main class="container">
    <section class="card large">
      <h2>Latest Cybersecurity News</h2>

      <div class="row">
        <input id="newsQuery" placeholder="Search keyword (ransomware, zero-day...)" />
        <select id="newsRegion">
          <option value="global">Global</option>
          <option value="india">India</option>
        </select>
        <button id="newsFetch" class="btn">Fetch News</button>
      </div>

      <div id="newsList" class="news-list">
      </div>

      <div class="muted">Tip: To enable live news, add a NewsAPI key inside <code>js/newsFeed.js</code>.</div>
    </section>
  </main>

  <script src="js/newsFeed.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
